# KissOO Application Configuration
# 
# Perst OODBMS is used for data storage - no SQL database configured
# This tells KISS to bypass database initialization

[main]

# No database configured - KISS won't open any SQL connection
# Perst is accessed via MainServlet.getEnvironment() - see PerstStorageManager
# DatabaseType = 
# DatabaseName = 

# Max number of simultaneous REST services (any additional are put on a queue)
MaxWorkerThreads = 30

# If a user is inactive for this many seconds, they get auto-logged off
UserInactiveSeconds = 900

# Require authentication even when no SQL database is configured
# Set to true when using Perst for user authentication
RequireAuthentication = true

# ===== DATABASE CONNECTION POOL SETTINGS =====
# These settings control the C3P0 connection pool behavior
# Uncomment and adjust for production/large applications

# Minimum number of connections to maintain in pool
# DatabaseMinPoolSize = 10

# Initial number of connections when pool starts
# DatabaseInitialPoolSize = 10

# Maximum number of connections allowed in pool
# For large applications: set to (CPU cores * 4) or higher based on load
# DatabaseMaxPoolSize = 100

# Number of connections to acquire when pool needs to grow
# DatabaseAcquireIncrement = 5

# Milliseconds to wait for a connection before timing out
# DatabaseCheckoutTimeout = 10000

# Maximum number of prepared statements to cache (improves performance)
# DatabaseMaxStatements = 500

# Maximum statements to cache per connection
# DatabaseMaxStatementsPerConnection = 25

# Seconds between testing idle connections (0 = disabled)
# DatabaseIdleTestPeriod = 300

# Seconds before removing idle connections (0 = never)
# DatabaseMaxIdleTime = 1800

# Test connections when checking out from pool (impacts performance)
# DatabaseTestOnCheckout = false

# Test connections when returning to pool (recommended)
# DatabaseTestOnCheckin = true

# Number of helper threads for pool management
# DatabaseHelperThreads = 10

# Seconds before forcibly reclaiming unreturned connections
# DatabaseUnreturnedTimeout = 60

# Enable stack traces for debugging unreturned connections (disable in production!)
# DatabaseDebugStackTraces = false

# ===== PERST OODBMS SETTINGS =====
# Perst configuration - accessed via PerstStorageManager

# Set to true to enable Perst OODBMS
PerstEnabled = true

# Use CDatabase (with versioning and Lucene) or standard Storage
# Set to false for basic Perst without Lucene indexing
PerstUseCDatabase = true

# Path to Perst database files (absolute path)
PerstDatabasePath = /home/dacosta/kissoo-data/oodb

# Page pool size in bytes (default: 512MB = 536870912)
PerstPagePoolSize = 536870912

# Set to true for faster writes but risk of data loss on crash
# WARNING: Only set to true for temporary data or during benchmarking
# Default: false (safe - all writes flushed to disk)
PerstNoflush = false

# Lucene full-text index optimization interval in seconds
# Set to 0 to disable automatic optimization
# Default: 86400 (24 hours)
PerstOptimizeInterval = 86400

# ===== ADMINISTRATOR SETTINGS =====
# Maximum number of administrators allowed in the system

# Maximum number of Super Administrators (full system access)
MaxSuperAdmins = 2

# Maximum number of Administrators (content management only)
MaxAdmins = 5

# ===== EMAIL / SMTP SETTINGS =====
# Email configuration for sending verification emails, password resets, etc.

# SMTP server hostname
mail.smtp.host = localhost

# SMTP server port (25, 587 for TLS, 465 for SSL)
mail.smtp.port = 1111

# SMTP authentication (set to true if your server requires auth)
mail.smtp.auth = false

# SMTP username (if auth is enabled)
mail.smtp.username = none

# SMTP password (if auth is enabled)
mail.smtp.password = none

# From email address for system emails
mail.from.address = noreply@localhost

# From display name
mail.from.name = KissOO

# ===== FRONTEND SETTINGS =====
# Frontend base URL for email verification links
app.baseUrl = http://localhost:5173

# ===== CORS SETTINGS =====
# Allowed origins for Cross-Origin Resource Sharing
# Use * for development (allows all origins)
# In production, specify exact origins: http://localhost:5173,http://example.com
CorsAllowedOrigins = *

# Allowed HTTP methods
CorsAllowedMethods = GET,POST,HEAD,OPTIONS,PUT

# Allowed headers (comma-separated)
CorsAllowedHeaders = Content-Type,X-Requested-With,Accept,Accept-Encoding,Accept-Language,Cache-Control,Connection,Host,Pragma,Origin,Referer,User-Agent,Access-Control-Request-Method,Access-Control-Request-Headers
